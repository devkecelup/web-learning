<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Belajar - YasaLearn</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="study-page">

  <!-- ══ NAVBAR ══ -->
  <nav class="study-topbar">
    <div class="study-topbar-left">
      <button class="study-icon-btn" onclick="window.location.href='dashboard.html'" title="Kembali">
        <i data-lucide="arrow-left" width="18" height="18"></i>
      </button>
      <div class="study-topbar-brand">
        <span style="font-weight:300">Yasa</span><span class="text-accent">Learn</span>
      </div>
    </div>

    <div class="study-topbar-center">
      <span class="study-qnum" id="qNumber">Soal 1/20</span>
      <div class="study-progress-bar">
        <div class="study-progress-fill" id="progressBar" style="width:0%"></div>
      </div>
    </div>

    <div class="study-topbar-right">
      <div class="study-timer-pill">
        <i data-lucide="clock" width="13" height="13"></i>
        <span id="timer">45:00</span>
      </div>
      <button class="study-icon-btn study-submit-btn" onclick="submitExam()" title="Selesai">
        <i data-lucide="send" width="16" height="16"></i>
      </button>
    </div>
  </nav>

  <!-- ══ MAIN LAYOUT ══ -->
  <div class="study-body">

    <!-- Sidebar: Question Nav (desktop only) -->
    <aside class="study-sidebar">
      <div class="study-sidebar-card">
        <div class="study-sidebar-title">Navigasi Soal</div>
        <div class="question-grid" id="questionNavGrid"></div>
      </div>
    </aside>

    <!-- Main question area -->
    <main class="study-main">

      <!-- Reading passage card -->
      <div class="study-passage-card" id="passageCard">
        <div class="study-passage-meta">
          <span class="badge" id="qCategory">Reading</span>
          <button id="translateBtn" onclick="toggleTranslation()" class="study-translate-btn" title="Tampilkan terjemahan">
            <i data-lucide="languages" width="15" height="15"></i>
            <span>Terjemahan</span>
          </button>
        </div>
        <h2 class="study-passage-title" id="qTitle"></h2>
        <div class="study-passage-text" id="qText"></div>
        <div class="study-passage-translation" id="qTextTranslation"></div>
      </div>

      <!-- Question + Options card -->
      <div class="study-question-card">
        <p class="study-question-text" id="qQuestion"></p>
        <div class="study-question-translation" id="qQuestionTranslation"></div>

        <div class="study-options" id="optionsContainer"></div>

        <!-- Explanation -->
        <div class="study-explanation" id="explanationCard">
          <div class="study-explanation-header">
            <i data-lucide="lightbulb" width="16" height="16"></i>
            <span>Penjelasan</span>
          </div>
          <p id="explanationText"></p>
        </div>

        <!-- Bottom Nav -->
        <div class="study-nav-footer">
          <button class="study-nav-prev-btn" id="btnPrev" onclick="prevQuestion()">
            <i data-lucide="chevron-left" width="17" height="17"></i>
            <span class="study-nav-label">Sebelumnya</span>
          </button>

          <div class="study-nav-dots" id="navProgress"></div>

          <button class="study-nav-next-btn" id="btnNext" onclick="handleNext()">
            <span class="study-nav-label" id="btnNextLabel">Selanjutnya</span>
            <i data-lucide="chevron-right" width="17" height="17" id="btnNextIcon"></i>
          </button>
        </div>
      </div>

    </main>
  </div>

  <!-- ══ MOBILE BOTTOM BAR ══ -->
  <div class="study-mobile-bar">
    <button class="study-mobile-nav-btn" onclick="prevQuestion()">
      <i data-lucide="chevron-left" width="20" height="20"></i>
    </button>
    <div class="study-mobile-info">
      <span id="mobileQNumber" class="study-mobile-num">1/20</span>
      <span class="study-mobile-timer">
        <i data-lucide="clock" width="11" height="11"></i>
        <span id="mobileTimer">45:00</span>
      </span>
    </div>
    <button class="study-mobile-nav-btn study-mobile-next" onclick="handleNext()">
      <i data-lucide="chevron-right" width="20" height="20"></i>
    </button>
  </div>

  <script src="script.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
